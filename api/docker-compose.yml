services:
  api:
    build:
      context: .
      target: production
    container_name: drowven_api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-drowven}
      DB_USER: ${DB_USER:-drowven_user}
      DB_PASSWORD: ${DB_PASSWORD:-drowven_password}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - drowven_network

  api-dev:
    image: node:22-alpine
    container_name: drowven_api_dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-drowven}
      DB_USER: ${DB_USER:-drowven_user}
      DB_PASSWORD: ${DB_PASSWORD:-drowven_password}
    command: sh -c "npm install && npm run dev"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - drowven_network
    profiles:
      - dev

  db:
    image: postgres:17-alpine
    container_name: drowven_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-drowven}
      POSTGRES_USER: ${DB_USER:-drowven_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-drowven_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT_HOST:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-drowven_user} -d ${DB_NAME:-drowven}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - drowven_network

volumes:
  postgres_data:
    name: drowven_postgres_data

networks:
  drowven_network:
    name: drowven_network
    driver: bridge
